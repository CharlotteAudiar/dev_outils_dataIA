# Source canonique de la liste des serveurs MCP.
# Les fichiers config/*.example.json sont dérivés de ce fichier.

servers:
  mcp-qgis:
    # Cf. servers/mcp-qgis/README.md — nkarasiak/qgis-mcp, pas de "python -m mcp_qgis" (n'existe pas).
    # Exposé via mcpo (proxy MCP -> OpenAPI), quel que soit le déploiement Open WebUI visé
    # (poste local ou instance mutualisée) : voir servers/mcp-qgis/README.md pour la commande
    # mcpo complète et la configuration côté Open WebUI (type OpenAPI, pas MCP natif).
    command: "uvx"
    args: ["--from", "git+https://github.com/nkarasiak/qgis-mcp", "qgis-mcp-server"]
    env:
      QGIS_MCP_HOST: "localhost"
      QGIS_MCP_PORT: "9876"

  mcp-filesystem:
    command: "node"
    args: ["servers/mcp-filesystem/src/index.js"]
    env:
      ALLOWED_ROOT: "${ALLOWED_ROOT}"

  mcp-postgres:
    command: "python"
    args: ["-m", "mcp_postgres"]
    env:
      DATABASE_URL: "${DATABASE_URL}"
